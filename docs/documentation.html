<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documentation - Project Registry</title>
    <style>
        :root {
            color-scheme: light dark;
            font-family: monospace;

            --color-primary: #646cff;
            --color-secondary: #888;
            --color-tertiary: #ccc;
        }

        body {
            display: flex;
            flex-direction: column;
            max-width: fit-content;
            min-height: 100vh;
            justify-content: center;
            margin: auto;
        }

        header {
            display: flex;
            flex-direction: column;
            align-items: first baseline;

            .title {
                display: flex;
                justify-content: center;
                align-items: baseline;

                h1 {
                    margin: 0px;
                }

                p {
                    margin: 0px;
                    margin-left: 12px;
                }
            }

            .title p {
                display: inline-block;
                animation: fadeInPulse 1.25s ease-in-out infinite;
            }
        }

        main {
            nav {
                ul {
                    display: flex;
                    gap: 12px;
                    margin: 0px;
                    padding: 0px;
                    list-style: none;
                }

                a {
                    text-decoration: none;
                    color: var(--color-secondary);
                    transition: color 0.2s ease-in-out;

                    &:hover {
                        color: var(--color-primary);
                    }

                    &.active {
                        color: var(--color-primary);
                        border-bottom: 1px solid var(--color-primary);
                    }
                }
            }
        }

        @keyframes fadeInPulse {
            0% {
                opacity: 0.5;
                transform: scale(1);
            }

            50% {
                opacity: 1;
                transform: scale(1.05);
            }

            100% {
                opacity: 0.5;
                transform: scale(1);
            }
        }
    </style>
</head>

<body>
    <header>
        <div class="title">
            <h1>Project Registry</h1>
            <p>[alpha]</p>
        </div>
        <p class="description">A registry for user projects.</p>
    </header>
    <main>
        <nav>
            <ul>
                <li><a href="./../index.html">Home</a></li>
                <li><a href="#" class="active">Documentation</a></li>
            </ul>
        </nav>
        <div class="content"></div>
    </main>
</body>

</html>
